<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Removed</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #111827;
      --accent: #60a5fa;
      --accent-2: #a78bfa;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --glass: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(167, 139, 250, 0.18), transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
      position: relative;
    }

    .bg-blur {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      z-index: 0;
    }

    .blur-one {
      width: 260px;
      height: 260px;
      background: #3b82f6;
      top: -60px;
      left: -60px;
    }

    .blur-two {
      width: 280px;
      height: 280px;
      background: #8b5cf6;
      bottom: -80px;
      right: -70px;
    }

    .main-wrap {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      padding: 24px;
    }

    .message-card {
      max-width: 760px;
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 42px 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #dbeafe;
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 22px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      box-shadow: 0 0 12px rgba(96, 165, 250, 0.8);
    }

    .headline {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin-bottom: 18px;
    }

    .headline .gradient-text {
      background: linear-gradient(135deg, #93c5fd, #c4b5fd, #f8fafc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtext {
      font-size: clamp(1rem, 2vw, 1.18rem);
      color: var(--muted);
      line-height: 1.7;
      max-width: 620px;
      margin: 0 auto 28px;
    }

    .highlight-name {
      color: #ffffff;
      font-weight: 700;
    }

    .mini-line {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      font-size: 0.95rem;
      font-weight: 500;
    }

    @media (max-width: 576px) {
      .message-card {
        padding: 30px 20px;
        border-radius: 22px;
      }

      .subtext {
        line-height: 1.6;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blur blur-one"></div>
  <div class="bg-blur blur-two"></div>

  <main class="main-wrap d-flex align-items-center justify-content-center">
    <section class="message-card">
      <div class="status-badge mx-auto">
        <span class="status-dot"></span>
        Access removed by Smith
      </div>

      <h1 class="headline">
        Why are you here? 👀<br>
        <span class="gradient-text">Yeah… I knew you'd come back.</span>
      </h1>

      <p class="subtext">
        This letter isn't here anymore. It was written with intent, but not received the same way.... so it has been removed.
        <br><br>
        If things were different, it might still be here.
      </p>

      <div class="mini-line">
        Want to read it? Ask <span class="highlight-name">Smith</span>. 🤍
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
